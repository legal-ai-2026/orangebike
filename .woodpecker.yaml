when:
  branch: main
  event: [push, tag]
steps:
  # --- Build & Push ---
  - name: build-and-push
    image: gcr.io/kaniko-project/executor:debug
    # Kaniko debug image includes busybox shell — use commands to compute
    # the short SHA, then invoke the executor explicitly.
    commands:
      - /kaniko/executor --dockerfile=Dockerfile --context=. --destination=ci-cd-zot.ci-cd.svc.cluster.local:5000/orangebike:latest --destination=ci-cd-zot.ci-cd.svc.cluster.local:5000/orangebike:$(echo $CI_COMMIT_SHA | cut -c1-8) --insecure --skip-tls-verify
    when:
      branch: main
      event: push
  # --- Deploy to Staging ---
  - name: deploy-staging
    image: bitnami/kubectl:latest
    depends_on: [build-and-push]
    commands:
      - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-8)
      - kubectl config set-cluster homelab --server=$K8S_SERVER --insecure-skip-tls-verify=true
      - kubectl config set-credentials deployer --token=$K8S_TOKEN
      - kubectl config set-context homelab --cluster=homelab --user=deployer --namespace=staging
      - kubectl config use-context homelab
      - sed -i "s|IMAGE_TAG|$SHORT_SHA|g" k8s/staging/deployment.yaml
      - kubectl apply -f k8s/staging/deployment.yaml
    environment:
      K8S_TOKEN:
        from_secret: K8S_TOKEN_STAGING
      K8S_SERVER:
        from_secret: K8S_SERVER
    when:
      branch: main
      event: push
  # --- Deploy to Production (on tag only) ---
  # Assumes the tagged commit was previously built and pushed on its main-branch push.
  # The tag must point to a commit whose short SHA image exists in the registry.
  - name: deploy-production
    image: bitnami/kubectl:latest
    commands:
      - export SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-8)
      - kubectl config set-cluster homelab --server=$K8S_SERVER --insecure-skip-tls-verify=true
      - kubectl config set-credentials deployer --token=$K8S_TOKEN
      - kubectl config set-context homelab --cluster=homelab --user=deployer --namespace=production
      - kubectl config use-context homelab
      - sed -i "s|IMAGE_TAG|$SHORT_SHA|g" k8s/production/deployment.yaml
      - kubectl apply -f k8s/production/deployment.yaml
    environment:
      K8S_TOKEN:
        from_secret: K8S_TOKEN_PRODUCTION
      K8S_SERVER:
        from_secret: K8S_SERVER
    when:
      event: tag
