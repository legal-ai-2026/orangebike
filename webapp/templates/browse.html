{% extends "base.html" %}
{% block title %}Data Browser — Orange Bike Brewing{% endblock %}
{% block content %}
<style>
    .browser-controls {
        display: flex;
        gap: 1rem;
        align-items: end;
        flex-wrap: wrap;
        margin-bottom: 1rem;
    }
    .browser-controls .form-group { margin-bottom: 0; }
    .browser-controls select, .browser-controls input { min-width: 180px; }

    .data-grid-wrapper {
        overflow-x: auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        margin-bottom: 1rem;
    }
    .data-grid {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
        white-space: nowrap;
    }
    .data-grid th {
        background: var(--dark);
        color: white;
        padding: 0.6rem 0.8rem;
        text-align: left;
        cursor: pointer;
        user-select: none;
        position: sticky;
        top: 0;
        z-index: 2;
    }
    .data-grid th:hover { background: #2a2a4e; }
    .data-grid th .sort-arrow { margin-left: 0.3rem; opacity: 0.4; }
    .data-grid th.sorted .sort-arrow { opacity: 1; color: var(--orange); }
    .data-grid td {
        padding: 0.45rem 0.8rem;
        border-bottom: 1px solid #f0f0f0;
        max-width: 300px;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .data-grid tr:hover td { background: var(--orange-light); }
    .data-grid .null-val { color: #ccc; font-style: italic; }
    .data-grid .num-val { text-align: right; font-variant-numeric: tabular-nums; }

    .pagination {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        justify-content: center;
        margin: 1rem 0;
    }
    .pagination button {
        padding: 0.4rem 1rem;
        border: 1px solid #ddd;
        background: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
    }
    .pagination button:hover:not(:disabled) { background: var(--orange-light); border-color: var(--orange); }
    .pagination button:disabled { opacity: 0.4; cursor: default; }
    .pagination .page-info { font-size: 0.85rem; color: var(--gray); }

    .stats-bar {
        display: flex;
        gap: 1.5rem;
        font-size: 0.85rem;
        color: var(--gray);
        margin-bottom: 0.5rem;
    }
    .stats-bar strong { color: var(--dark); }

    /* SQL Console */
    .sql-console {
        margin-top: 2rem;
    }
    .sql-console textarea {
        width: 100%;
        min-height: 100px;
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 0.88rem;
        padding: 1rem;
        border: 2px solid #ddd;
        border-radius: 8px;
        resize: vertical;
        line-height: 1.5;
    }
    .sql-console textarea:focus {
        border-color: var(--orange);
        outline: none;
        box-shadow: 0 0 0 3px rgba(232,122,46,0.15);
    }
    .sql-buttons {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin-top: 0.5rem;
    }
    .sql-error {
        background: #f8d7da;
        color: #721c24;
        padding: 0.6rem 1rem;
        border-radius: 8px;
        font-size: 0.85rem;
        margin-top: 0.5rem;
    }
    .sql-info {
        font-size: 0.8rem;
        color: var(--gray);
    }
    .query-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.5rem;
    }
    .query-chip {
        padding: 0.25rem 0.7rem;
        background: #eef;
        border: 1px solid #dde;
        border-radius: 15px;
        font-size: 0.75rem;
        cursor: pointer;
        font-family: monospace;
    }
    .query-chip:hover { background: var(--orange-light); border-color: var(--orange); }

    .tab-bar {
        display: flex;
        gap: 0;
        border-bottom: 2px solid #eee;
        margin-bottom: 1rem;
    }
    .tab-bar button {
        padding: 0.7rem 1.5rem;
        background: none;
        border: none;
        border-bottom: 3px solid transparent;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--gray);
        margin-bottom: -2px;
    }
    .tab-bar button.active {
        color: var(--orange);
        border-bottom-color: var(--orange);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
</style>

<h1>Data Browser</h1>

<div class="tab-bar">
    <button class="active" onclick="switchTab('table-tab', this)">Table View</button>
    <button onclick="switchTab('sql-tab', this)">SQL Console</button>
</div>

<!-- ── Table Browser Tab ── -->
<div id="table-tab" class="tab-content active">
    <div class="browser-controls">
        <div class="form-group">
            <label for="table-select">Table</label>
            <select id="table-select" onchange="loadTable()">
                {% for t in tables %}
                <option value="{{ t.name }}">{{ t.name }} ({{ "{:,}".format(t.rows) }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="search-input">Search</label>
            <input type="text" id="search-input" placeholder="Filter rows..."
                   onkeydown="if(event.key==='Enter')loadTable(1)">
        </div>
        <div class="form-group">
            <label for="per-page-select">Rows</label>
            <select id="per-page-select" onchange="loadTable(1)" style="min-width:80px;">
                <option value="25">25</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
                <option value="200">200</option>
            </select>
        </div>
        <button class="btn btn-primary btn-sm" onclick="loadTable(1)">Search</button>
        <button class="btn btn-secondary btn-sm" onclick="clearSearch()">Clear</button>
    </div>

    <div class="stats-bar" id="stats-bar"></div>

    <div class="data-grid-wrapper" style="max-height:65vh; overflow-y:auto;">
        <table class="data-grid" id="data-grid">
            <thead id="grid-head"></thead>
            <tbody id="grid-body"></tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>
</div>

<!-- ── SQL Console Tab ── -->
<div id="sql-tab" class="tab-content">
    <div class="sql-console">
        <div class="form-group">
            <label>SQL Query <span class="sql-info">(read-only — SELECT, WITH, PRAGMA)</span></label>
            <textarea id="sql-input" spellcheck="false">SELECT item, COUNT(*) as transactions, ROUND(SUM(net_sales), 2) as total_sales
FROM taproom_transactions
WHERE event_type = 'Payment'
GROUP BY item
ORDER BY transactions DESC
LIMIT 20</textarea>
        </div>
        <div class="sql-buttons">
            <button class="btn btn-primary" onclick="runQuery()">Run Query</button>
            <button class="btn btn-secondary" onclick="downloadQueryCSV()" id="download-csv-btn" disabled>Download CSV</button>
            <span id="query-status" class="sql-info"></span>
        </div>
        <div id="sql-error" class="sql-error" style="display:none;"></div>

        <div style="margin-top:0.8rem;">
            <label style="font-size:0.8rem;">Quick queries:</label>
            <div class="query-chips">
                <span class="query-chip" onclick="setQuery('SELECT * FROM beer_styles ORDER BY style_name')">All styles</span>
                <span class="query-chip" onclick="setQuery(`SELECT substr(date,1,7) as month, COUNT(*) as txns, ROUND(SUM(net_sales),2) as sales\nFROM taproom_transactions\nWHERE event_type='Payment'\nGROUP BY month ORDER BY month`)">Monthly sales</span>
                <span class="query-chip" onclick="setQuery(`SELECT year, ROUND(value,2) as total\nFROM sales_summary_annual\nWHERE metric='Net Total'\nORDER BY year`)">Annual revenue</span>
                <span class="query-chip" onclick="setQuery(`SELECT a.account_name, a.territory, a.city,\n  COUNT(*) as lines, ROUND(SUM(w.quantity),1) as qty\nFROM wholesale_orders w\nJOIN accounts a ON w.account_name = a.account_name\nGROUP BY w.account_name\nORDER BY qty DESC LIMIT 20`)">Top accounts</span>
                <span class="query-chip" onclick="setQuery(`SELECT style_name, channel, ROUND(SUM(cases),1) as total\nFROM can_sales_weekly\nGROUP BY style_name, channel\nORDER BY style_name, channel`)">Style x Channel</span>
                <span class="query-chip" onclick="setQuery(`SELECT substr(time,1,2) as hour,\n  COUNT(*) as txns, ROUND(SUM(net_sales),2) as sales\nFROM taproom_transactions\nWHERE event_type='Payment'\nGROUP BY hour ORDER BY hour`)">Hourly pattern</span>
            </div>
        </div>

        <div class="data-grid-wrapper" style="max-height:55vh; overflow-y:auto; margin-top:1rem;" id="query-results-wrapper" hidden>
            <table class="data-grid" id="query-grid">
                <thead id="query-head"></thead>
                <tbody id="query-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// ── State ──
let currentTable = '';
let currentPage = 1;
let currentSort = '';
let currentOrder = 'asc';
let lastQueryResult = null;

// ── Tab switching ──
function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
}

// ── Table Browser ──
function loadTable(page) {
    const table = document.getElementById('table-select').value;
    const search = document.getElementById('search-input').value;
    const perPage = document.getElementById('per-page-select').value;
    if (page) currentPage = page;
    if (table !== currentTable) { currentSort = ''; currentOrder = 'asc'; currentPage = 1; }
    currentTable = table;

    let url = `${window.URL_PREFIX}/api/browse/${table}?page=${currentPage}&per_page=${perPage}`;
    if (currentSort) url += `&sort=${currentSort}&order=${currentOrder}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;

    fetch(url)
        .then(r => r.json())
        .then(data => {
            if (data.error) { alert(data.error); return; }
            renderGrid(data);
            renderPagination(data);
            renderStats(data);
        });
}

function renderGrid(data) {
    const thead = document.getElementById('grid-head');
    const tbody = document.getElementById('grid-body');

    // Header
    let hhtml = '<tr>';
    data.columns.forEach(col => {
        const isSorted = data.sort === col.name;
        const arrow = isSorted ? (data.order === 'asc' ? ' ▲' : ' ▼') : ' ↕';
        const cls = isSorted ? 'sorted' : '';
        hhtml += `<th class="${cls}" onclick="sortBy('${col.name}')">
            ${col.name}<span class="sort-arrow">${arrow}</span>
        </th>`;
    });
    hhtml += '</tr>';
    thead.innerHTML = hhtml;

    // Body
    const numTypes = ['INTEGER', 'REAL', 'NUMERIC'];
    let bhtml = '';
    data.rows.forEach(row => {
        bhtml += '<tr>';
        row.forEach((val, i) => {
            const isNum = numTypes.includes(data.columns[i].type);
            if (val === null || val === '') {
                bhtml += `<td class="null-val">null</td>`;
            } else if (isNum) {
                bhtml += `<td class="num-val">${val}</td>`;
            } else {
                const s = String(val).length > 80 ? String(val).slice(0,77) + '...' : String(val);
                bhtml += `<td>${escapeHtml(s)}</td>`;
            }
        });
        bhtml += '</tr>';
    });
    tbody.innerHTML = bhtml || '<tr><td colspan="99" style="text-align:center;color:var(--gray);padding:2rem;">No rows found</td></tr>';
}

function renderPagination(data) {
    const div = document.getElementById('pagination');
    const { page, pages, total, per_page } = data;
    const start = (page - 1) * per_page + 1;
    const end = Math.min(page * per_page, total);

    div.innerHTML = `
        <button onclick="loadTable(1)" ${page<=1?'disabled':''}>First</button>
        <button onclick="loadTable(${page-1})" ${page<=1?'disabled':''}>Prev</button>
        <span class="page-info">${start}-${end} of ${total.toLocaleString()} rows (page ${page}/${pages})</span>
        <button onclick="loadTable(${page+1})" ${page>=pages?'disabled':''}>Next</button>
        <button onclick="loadTable(${pages})" ${page>=pages?'disabled':''}>Last</button>
    `;
}

function renderStats(data) {
    const div = document.getElementById('stats-bar');
    div.innerHTML = `
        <span><strong>${data.table}</strong></span>
        <span>${data.total.toLocaleString()} rows</span>
        <span>${data.columns.length} columns</span>
    `;
}

function sortBy(col) {
    if (currentSort === col) {
        currentOrder = currentOrder === 'asc' ? 'desc' : 'asc';
    } else {
        currentSort = col;
        currentOrder = 'asc';
    }
    loadTable(1);
}

function clearSearch() {
    document.getElementById('search-input').value = '';
    loadTable(1);
}

// ── SQL Console ──
function setQuery(sql) {
    document.getElementById('sql-input').value = sql;
}

function runQuery() {
    const sql = document.getElementById('sql-input').value.trim();
    if (!sql) return;

    document.getElementById('sql-error').style.display = 'none';
    document.getElementById('query-status').textContent = 'Running...';
    document.getElementById('download-csv-btn').disabled = true;

    fetch(window.URL_PREFIX + '/api/query', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({sql})
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) {
            document.getElementById('sql-error').textContent = data.error;
            document.getElementById('sql-error').style.display = 'block';
            document.getElementById('query-status').textContent = '';
            document.getElementById('query-results-wrapper').hidden = true;
            return;
        }

        lastQueryResult = data;
        const truncNote = data.truncated ? ' (capped at 5,000)' : '';
        document.getElementById('query-status').textContent =
            `${data.row_count.toLocaleString()} rows${truncNote} in ${data.columns.length} columns`;
        document.getElementById('download-csv-btn').disabled = false;

        // Render results
        const thead = document.getElementById('query-head');
        const tbody = document.getElementById('query-body');

        let hhtml = '<tr>';
        data.columns.forEach(c => { hhtml += `<th>${escapeHtml(c)}</th>`; });
        hhtml += '</tr>';
        thead.innerHTML = hhtml;

        let bhtml = '';
        data.rows.forEach(row => {
            bhtml += '<tr>';
            row.forEach(val => {
                if (val === null) {
                    bhtml += '<td class="null-val">null</td>';
                } else if (typeof val === 'number') {
                    bhtml += `<td class="num-val">${val}</td>`;
                } else {
                    const s = String(val).length > 100 ? String(val).slice(0,97) + '...' : String(val);
                    bhtml += `<td>${escapeHtml(s)}</td>`;
                }
            });
            bhtml += '</tr>';
        });
        tbody.innerHTML = bhtml;
        document.getElementById('query-results-wrapper').hidden = false;
    })
    .catch(err => {
        document.getElementById('sql-error').textContent = err.message;
        document.getElementById('sql-error').style.display = 'block';
        document.getElementById('query-status').textContent = '';
    });
}

function downloadQueryCSV() {
    if (!lastQueryResult) return;
    fetch(window.URL_PREFIX + '/api/query/csv', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({columns: lastQueryResult.columns, rows: lastQueryResult.rows})
    })
    .then(r => r.blob())
    .then(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'query_result.csv';
        a.click();
        URL.revokeObjectURL(url);
    });
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// Keyboard shortcut: Ctrl/Cmd+Enter runs query
document.getElementById('sql-input').addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runQuery();
    }
});

// Load first table on page load
document.addEventListener('DOMContentLoaded', () => loadTable(1));
</script>
{% endblock %}
