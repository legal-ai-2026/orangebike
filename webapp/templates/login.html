<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Orange Bike Brewing</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1b0e 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: white; border-radius: 16px; padding: 2.5rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .brand {
            color: #E87A2E; font-size: 1.5rem; font-weight: 700;
            text-align: center; margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #6c757d; font-size: 0.9rem; text-align: center; margin-bottom: 2rem;
        }
        label {
            display: block; font-weight: 600; font-size: 0.85rem;
            margin-bottom: 0.4rem; color: #1a1a2e;
        }
        input[type="password"] {
            width: 100%; padding: 0.8rem 1rem; border: 1px solid #ddd;
            border-radius: 8px; font-size: 1rem; margin-bottom: 1rem;
        }
        input[type="password"]:focus {
            outline: none; border-color: #E87A2E;
            box-shadow: 0 0 0 3px rgba(232, 122, 46, 0.15);
        }
        .btn {
            width: 100%; padding: 0.8rem; background: #E87A2E; color: white;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: #C4631F; }
        .error {
            background: #f8d7da; color: #721c24; padding: 0.7rem 1rem;
            border-radius: 8px; margin-bottom: 1rem; font-size: 0.85rem;
            border: 1px solid #f5c6cb;
        }
        .info {
            color: #6c757d; font-size: 0.8rem; text-align: center;
            margin-top: 1.5rem; line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">Orange Bike Brewing</div>
        <p class="subtitle">ALY 6080 Data Browser — Spring 2026</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            {% if next_url %}
            <input type="hidden" name="next" value="{{ next_url }}">
            {% endif %}
            <label for="password">Class password</label>
            <input type="password" id="password" name="password" required autofocus>
            <button type="submit" class="btn">Sign in</button>
        </form>

        <p class="info">
            Read-only access to the unified database.<br>
            Browse, run SELECT queries, and download data.
        </p>
    </div>
</body>
</html>
