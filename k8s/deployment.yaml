# Orange Bike Brewing — k8s manifests
# Namespace: staging
# Public URL: https://crowdsaasing.com/orangebike/
# Internal LB: 192.168.0.248
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: orangebike-data
  namespace: staging
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orangebike
  namespace: staging
  labels:
    app: orangebike
spec:
  replicas: 1
  strategy:
    # Recreate avoids two pods contending for the same RWO PVC
    type: Recreate
  selector:
    matchLabels:
      app: orangebike
  template:
    metadata:
      labels:
        app: orangebike
    spec:
      containers:
        - name: orangebike
          image: 192.168.0.247:5000/orangebike:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_DIR
              value: "/data"
            - name: UPLOADS_DIR
              value: "/data/uploads"
            - name: URL_PREFIX
              value: "/orangebike"
            - name: READ_ONLY
              value: "true"
            - name: SESSION_HOURS
              value: "12"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: orangebike-secrets
                  key: SECRET_KEY
            - name: OBB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orangebike-secrets
                  key: OBB_PASSWORD
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: orangebike-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /orangebike/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /orangebike/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: orangebike-data
---
apiVersion: v1
kind: Service
metadata:
  name: orangebike
  namespace: staging
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.0.248"
spec:
  type: LoadBalancer
  selector:
    app: orangebike
  ports:
    - name: http
      port: 80
      targetPort: 8080
